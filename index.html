<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UnblockZone</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --card: #1a1a1f;
      --card-hover: #222228;
      --border: #2a2a35;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8e8f0;
      --muted: #888899;
      --footer-bg: #111115;
      --glow: 0 0 20px rgba(0, 229, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NOTICE OVERLAY ── */
    #notice-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    #notice-overlay.hidden { display: none; }
    .notice-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 2.2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.07);
      animation: slideUp 0.2s ease;
    }
    .notice-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,58,237,0.15));
      border: 1px solid rgba(0,229,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      color: var(--accent);
    }
    .notice-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .notice-text {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.6rem;
    }
    .notice-text strong { color: var(--accent); font-weight: 600; }
    .notice-btn {
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      border: none;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .notice-btn:hover { opacity: 0.88; transform: translateY(-2px); }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 0 2rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(13,13,15,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #00e5ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
    }
    .logo span { color: #fff; -webkit-text-fill-color: #fff; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .search-bar {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.9rem;
      gap: 0.5rem;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      width: 200px;
    }
    .search-bar input::placeholder { color: var(--muted); }
    .search-icon { color: var(--muted); display: flex; }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .section-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .section-title {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    /* ── GAME GRID ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      position: relative;
    }
    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(0,229,255,0.12);
    }
    .game-card:hover .play-overlay { opacity: 1; }
    .card-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .game-card:hover .card-thumb img { transform: scale(1.05); }
    .thumb-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
    }
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,229,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .play-btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1.1rem;
    }
    .card-info { padding: 0.75rem 0.9rem; border-top: 1px solid var(--border); }
    .card-name {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tag {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── LOADING / EMPTY ── */
    .status-msg {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 10;
      background: var(--footer-bg);
      border-top: 1px solid var(--border);
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, #00e5ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .footer-text { font-size: 0.8rem; color: var(--muted); }
    .footer-links { display: flex; gap: 1.2rem; }
    .footer-links a { color: var(--muted); text-decoration: none; font-size: 0.8rem; transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }

    /* ── GAME MODAL ── */
    #game-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    #game-modal.open { display: flex; animation: fadeIn 0.15s ease; }
    .modal-inner {
      width: 95vw;
      max-width: 1200px;
      height: 90vh;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,229,255,0.05);
      animation: slideUp 0.18s ease;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.2rem;
      height: 48px;
      min-height: 48px;
      border-bottom: 1px solid var(--border);
      background: var(--card);
      gap: 1rem;
    }
    .modal-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-actions { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .modal-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .modal-btn:hover { border-color: var(--accent); background: var(--card-hover); color: var(--accent); }
    .modal-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .modal-close:hover { border-color: #ff4d6d; color: #ff4d6d; background: rgba(255,77,109,0.08); }
    .modal-body { flex: 1; position: relative; background: #000; }
    .modal-body iframe { width: 100%; height: 100%; border: none; display: block; }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

    @media (max-width: 768px) {
      header { padding: 0 1rem; }
      .logo { font-size: 1.2rem; }
      .search-bar input { width: 140px; }
      main { padding: 1rem; }
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .footer-links { display: none; }
    }
    @media (max-width: 480px) {
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
      .modal-inner { width: 100vw; height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>

  <!-- NOTICE OVERLAY -->
  <div id="notice-overlay">
    <div class="notice-box">
      <div class="notice-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div class="notice-title">Close Previous Tab</div>
      <div class="notice-text">
        Please <strong>close the previous tab</strong> you came from before continuing.<br/>This keeps your browsing history clean.
      </div>
      <button class="notice-btn" onclick="dismissNotice()">Got it, let's play</button>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo">Unblock<span>Zone</span></div>
    <div class="header-right">
      <div class="search-bar">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" id="search-input" placeholder="Search games..." oninput="filterGames(this.value)" />
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="section-label">// Play Now</div>
    <div class="section-title">All Games</div>
    <div class="game-grid" id="game-grid">
      <div class="status-msg"><span class="loading-dots">Loading games</span></div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">UnblockZone</div>
    <div class="footer-text">Free / Fast / Unblocked</div>
    <div class="footer-links">
      <a href="#">Home</a>
      <a href="#">Games</a>
    </div>
  </footer>

  <!-- GAME MODAL -->
  <div id="game-modal">
    <div class="modal-inner">
      <div class="modal-header">
        <div class="modal-title" id="modal-game-title">Loading...</div>
        <div class="modal-actions">
          <button class="modal-btn" onclick="openFullscreen()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            Fullscreen
          </button>
          <button class="modal-btn" onclick="reloadGame()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Reload
          </button>
          <button class="modal-close" onclick="closeModal()" title="Close">&#x2715;</button>
        </div>
      </div>
      <div class="modal-body">
        <iframe id="game-frame" src="" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    // ── NOTICE ──
    function dismissNotice() {
      document.getElementById("notice-overlay").classList.add("hidden");
    }

    // ── GAME DATA from gn-math CDN ──
    var coverURL = "https://cdn.jsdelivr.net/gh/gn-math/covers@main";
    var htmlURL  = "https://cdn.jsdelivr.net/gh/gn-math/html@main";
    var zonesurls = [
      "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json",
      "https://cdn.jsdelivr.net/gh/gn-math/assets@latest/zones.json",
      "https://cdn.jsdelivr.net/gh/gn-math/assets/zones.json"
    ];

    var allZones = [];

    async function loadGames() {
      var grid = document.getElementById("game-grid");
      try {
        // Try each URL until one works
        var json = null;
        for (var i = 0; i < zonesurls.length; i++) {
          try {
            var res = await fetch(zonesurls[i] + "?t=" + Date.now());
            if (res.ok) { json = await res.json(); break; }
          } catch(e) {}
        }
        if (!json) throw new Error("All URLs failed");

        allZones = json;
        // Sort alphabetically by default
        allZones.sort(function(a, b) { return a.name.localeCompare(b.name); });
        renderGames(allZones);
      } catch(e) {
        grid.innerHTML = '<div class="status-msg">Failed to load games. Please refresh.</div>';
      }
    }

    function renderGames(list) {
      var grid = document.getElementById("game-grid");
      grid.innerHTML = "";

      if (list.length === 0) {
        grid.innerHTML = '<div class="status-msg">No games found.</div>';
        return;
      }

      list.forEach(function(zone) {
        var card = document.createElement("div");
        card.className = "game-card";
        card.onclick = function() { launchGame(zone); };

        var coverSrc = zone.cover
          ? zone.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL)
          : "";

        var imgHTML = coverSrc
          ? '<img src="' + coverSrc + '" alt="' + zone.name + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'
          : '';
        var placeholderStyle = coverSrc ? ' style="display:none"' : '';

        card.innerHTML =
          '<div class="card-thumb">' +
            imgHTML +
            '<div class="thumb-placeholder"' + placeholderStyle + '></div>' +
            '<div class="play-overlay"><div class="play-btn-icon">&#9654;</div></div>' +
          '</div>' +
          '<div class="card-info">' +
            '<div class="card-name">' + zone.name + '</div>' +
            '<div class="card-tag">UnblockZone</div>' +
          '</div>';

        grid.appendChild(card);
      });
    }

    function filterGames(query) {
      var q = query.toLowerCase().trim();
      if (!q) { renderGames(allZones); return; }
      renderGames(allZones.filter(function(z) {
        return z.name.toLowerCase().includes(q);
      }));
    }

    function launchGame(zone) {
      currentZone = zone;

      var url = zone.url
        ? zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL)
        : "";

      document.getElementById("modal-game-title").textContent = zone.name;
      document.getElementById("game-modal").classList.add("open");
      document.body.style.overflow = "hidden";
      document.getElementById("game-frame").src = url;
    }

    function closeModal() {
      document.getElementById("game-modal").classList.remove("open");
      document.getElementById("game-frame").src = "";
      document.body.style.overflow = "";
    }

    function reloadGame() {
      var f = document.getElementById("game-frame");
      var src = f.src;
      f.src = "";
      f.src = src;
    }

    function openFullscreen() {
      var f = document.getElementById("game-frame");
      if (f.requestFullscreen) f.requestFullscreen();
      else if (f.webkitRequestFullscreen) f.webkitRequestFullscreen();
    }

    document.getElementById("game-modal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeModal();
    });

    // Boot
    loadGames();
  </script>
</body>
</html>
